events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  server {
    listen 80;

    add_header X-Frame-Options        "DENY"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer"   always;

    # ── User Service ────────────────────────────────────────────
    location /api/users/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass            http://user-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/users/;
      proxy_ssl_server_name on;
      proxy_ssl_verify      off;
      proxy_http_version    1.1;
      proxy_set_header      Connection "";
      proxy_set_header      Host       user-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header      X-Real-IP  $remote_addr;
    }

    # ── Admin Service ───────────────────────────────────────────
    location /api/admin/ {
      limit_req zone=api burst=5 nodelay;
      proxy_pass            http://admin-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/admin/;
      proxy_ssl_server_name on;
      proxy_ssl_verify      off;
      proxy_http_version    1.1;
      proxy_set_header      Connection "";
      proxy_set_header      Host       admin-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header      X-Real-IP  $remote_addr;
    }

    # ── Appointment Service ─────────────────────────────────────
    location /api/appointments/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass            http://appointment-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/appointments/;
      proxy_ssl_server_name on;
      proxy_ssl_verify      off;
      proxy_http_version    1.1;
      proxy_set_header      Connection "";
      proxy_set_header      Host       appointment-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header      X-Real-IP  $remote_addr;
    }

    # ── Service Provider Service ────────────────────────────────
    location /api/providers/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass            http://service-provider-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/providers/;
      proxy_ssl_server_name on;
      proxy_ssl_verify      off;
      proxy_http_version    1.1;
      proxy_set_header      Connection "";
      proxy_set_header      Host       service-provider-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header      X-Real-IP  $remote_addr;
    }

    # ── Health Check ─────────────────────────────────────────────
    location /health {
      return 200 '{"status":"gateway-ok"}';
      add_header Content-Type application/json;
    }
  }
}