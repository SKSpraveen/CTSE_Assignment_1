events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  server {
    listen 80;

    add_header Access-Control-Allow-Origin  "*"                               always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type"     always;
    add_header X-Frame-Options              "DENY"                            always;
    add_header X-Content-Type-Options       "nosniff"                         always;

    location /api/users/ {
      if ($request_method = OPTIONS) { return 204; }
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://user-service/api/users/;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host      $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/admin/ {
      if ($request_method = OPTIONS) { return 204; }
      limit_req zone=api burst=5 nodelay;
      proxy_pass         http://admin-service/api/admin/;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host      $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/appointments/ {
      if ($request_method = OPTIONS) { return 204; }
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://appointment-service/api/appointments/;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host      $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /api/providers/ {
      if ($request_method = OPTIONS) { return 204; }
      limit_req zone=api burst=10 nodelay;
      proxy_pass         http://service-provider-service/api/providers/;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host      $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /health {
      return 200 '{"status":"gateway-ok"}';
      add_header Content-Type application/json;
    }
  }
}