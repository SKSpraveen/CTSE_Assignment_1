events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  server {
    listen 80;

     set $cors_origin "";

    if ($http_origin ~* (http://localhost:5173|https://ctse-assignment-1-7w5m3ri9c-mynamesasindu-gmailcoms-projects.vercel.app)) {
        set $cors_origin $http_origin;
    }


    add_header X-Frame-Options        "DENY"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer"   always;

    # ================= USER SERVICE =================
    location /api/users/ {
      limit_req zone=api burst=10 nodelay;

      # ✅ REMOVE backend CORS
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      # ✅ ADD correct CORS
      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      # ✅ HANDLE preflight
      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass https://user-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/users/;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host user-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ================= ADMIN SERVICE =================
    location /api/admin/ {
      limit_req zone=api burst=5 nodelay;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass https://admin-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/admin/;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host admin-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ================= APPOINTMENT SERVICE =================
    location /api/appointments/ {
      limit_req zone=api burst=10 nodelay;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass https://appointment-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/appointments/;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host appointment-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ================= PROVIDER SERVICE =================
    location /api/providers/ {
      limit_req zone=api burst=10 nodelay;

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass https://service-provider-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io/api/providers/;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host service-provider-service.internal.delightfulmoss-83663602.eastus.azurecontainerapps.io;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ================= HEALTH =================
    location /health {
      return 200 '{"status":"gateway-ok"}';
      add_header Content-Type application/json;
    }
  }
}